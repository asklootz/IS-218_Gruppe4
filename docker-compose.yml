services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      DB_SSL: "${DB_SSL:-true}"
      PGHOST: "${PGHOST:-}"
      PGPORT: "${PGPORT:-}"
      PGDATABASE: "${PGDATABASE:-}"
      PGUSER: "${PGUSER:-}"
      PGPASSWORD: "${PGPASSWORD:-}"
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
